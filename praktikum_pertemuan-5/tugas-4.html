<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cek Huruf Mutu</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Form Cek Nilai</h2>
      <p class="subtitle">informatika</p>

      <div class="nim">
        <label for="nim">NIM Mahasiswa:</label>
        <input type="text" id="nim" placeholder="Contoh: 2410631170097" />
      </div>

      <div class="matkul">
        <label for="nim">Mata Kuliah:</label>
        <input
          type="text"
          id="nim"
          placeholder="Contoh: Pemograman Berbasis Web"
        />
      </div>

      <div class="nilai">
        <label for="nilai">Nilai Mata Kuliah:</label>
        <input type="number" id="nilai" placeholder="Masukkan nilai (0-100)" />
      </div>
      <button onclick="cekNilai()">Cek Nilai</button>

      <div id="hasil" class="result" style="display: none"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
