<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Web Singaperbangsa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>Selamat Datang di Website Sederhana</header>

    <nav>
        <ul>
            <li><a href="#">Beranda</a></li>
            <li><a href="#">Tentang</a></li>
            <li><a href="#">Layanan</a></li>
            <li><a href="#">Kontak</a></li>
        </ul>
    </nav>

    <div class="container">
        <section class="content">
            <h1>Formulir Pendaftaran</h1>
            <p>Silahkan ini formulir di bawah ini untuk mendaftar</p>

            <form action="" method="GET"></form>
            
                <div class="nama">
                    <label for="">Nama Lengkap:</label>
                    <input type="text" name="Username">
                </div>

                <br>

                <div class="email">
                    <label for="">Email:</label>
                    <input type="text" name="email">
                </div>

                <br>

                <div class="password">
                    <label for="">Password:</label>
                    <input type="Password" name="Password">
                </div>

                <br>

                <div class="gender">
                    <label for="">Jenis Kelamin:</label>
                    <input type="radio" name="gender" value="1"> Laki - Laki
                    <input type="radio" name="gender" value="2"> Perempuan
                </div>

                <br>

                <div class="hobby">
                    <label for="">Hobby</label>
                    <input type="checkbox" name="hobby" value="musik"> Musik
                    <input type="checkbox" name="hobby" value="olahraga"> Olahraga
                    <input type="checkbox" name="hobby" value="membaca"> Membaca
                </div>

                <br>

                <div>
                    <label for="">Pilih Kota:</label>
                    <select name="kota" id="">
                        <option value="1">Jakarta</option>
                        <option value="2">Majalengka</option>
                        <option value="3">Bali</option>
                    </select>
                </div>

                <br>

                <div>
                    <label for="">Pesan Tambahan:</label>
                    <text type="text" name="pesan" placeholder="Tulis pesan disini"></text>
                </div>

                
                <button type="submit">Kirim</button>
            </form>

        </section>

        <aside class="sidebar">
            <h2>Sidebar</h2>
            <p>Bagian sidebar dapat berisi tautan, iklan, atau informasi tambahan.</p>
        </aside>
    </div>

</body>
</html>
